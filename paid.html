        function renderGrid(cat) {
            let filtered = allPaid;
            if (cat !== 'all') filtered = allPaid.filter(t => (t.category || '').toLowerCase() === cat || (t.title || '').toLowerCase().includes(cat));
            const grid = document.getElementById('paidGrid');
            if (filtered.length === 0) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><h3>No premium templates yet</h3><p>Check back later for new releases</p></div>'; return; }
            grid.innerHTML = filtered.map(t => '<a href="templatesdetails.html?id=' + t.id + '" class="template-card"><div class="card-img-wrap"><img src="' + (t.bannerImage || 'https://via.placeholder.com/600x400?text=No+Image') + '" alt="' + t.title + '" loading="lazy"><span class="card-badge paid">&#8377;' + (t.price || 0) + '</span></div><div class="card-body"><h3 class="card-title">' + t.title + '</h3><div class="card-stats"><span class="card-stat"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' + formatCount(t.views || 0) + '</span><span class="card-stat"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>' + formatCount(t.downloads || 0) + '</span></div></div></a>').join('');
        }
        document.addEventListener('DOMContentLoaded', loadPaid);
    </script>
